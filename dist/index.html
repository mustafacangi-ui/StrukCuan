      ── Font loading strategy ───────────────────────────────────────────────
      1. preconnect  → opens TCP+TLS to Google Fonts before the browser even
                       parses the stylesheet, saving ~100-300 ms RTT.
      2. <link rel="stylesheet"> in <head> with display=swap already in the
                       URL → fonts load non-blocking; text stays visible
                       (FOUT instead of FOIT) while the font downloads.
      3. Weights are trimmed to only what the app actually uses, halving the
         font payload vs the old four-family, eight-weight import.
    -->
