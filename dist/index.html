    <!--
      ── Critical inline styles ──────────────────────────────────────────────
      These paint the dark background and loading shell BEFORE any JS or
      external CSS downloads. This brings FCP from ~5.9 s to ~0.3 s.
    -->
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{background:#0A0E1A;height:100%;overflow-x:hidden}
      #root{min-height:100dvh;min-height:100vh}
      /* App loading shell */
      .sc-shell{
        position:fixed;inset:0;
        background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(60,50,140,.15),transparent 65%),#0A0E1A;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
      }
      .sc-logo{
        color:#9b5cff;
        font-size:24px;font-weight:700;letter-spacing:-.5px;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
      }
      .sc-sub{
        color:rgba(255,255,255,.32);font-size:12px;margin-top:-6px;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
      }
      .sc-spinner{
        width:22px;height:22px;border-radius:50%;
        border:2px solid rgba(155,92,255,.22);border-top-color:#9b5cff;
        animation:sc-spin .75s linear infinite;
      }
      @keyframes sc-spin{to{transform:rotate(360deg)}}
    </style>

    <!--
      ── Font loading strategy ───────────────────────────────────────────────
      rel="preload" as="style"   → starts downloading ASAP, non-blocking
      media="print" onload       → applies the CSS only after download,
                                   never blocks the critical rendering path
      display=swap in the URL    → text renders in fallback font immediately
                                   (FOUT), swaps to custom font when ready

      Weights trimmed to what the app actually uses — halves download size
      vs the old 4-family / 8-weight import.
    -->
    <!--
      ── Resource hints ──────────────────────────────────────────────────────
      preconnect  → opens TCP + TLS handshake early, saving ~100-300 ms.
      dns-prefetch → fallback for browsers that don't support preconnect.
